kind = "web"
previewPath = "/"
title = "Theorema Aureum 143 — Certificate Ledger"
version = "1.0.0"
id = "artifacts/theorema-certs"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23179

[services.development]
run = "pnpm --filter @workspace/theorema-certs run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/theorema-certs", "run", "build" ]
publicDir = "artifacts/theorema-certs/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23179"
BASE_PATH = "/"
