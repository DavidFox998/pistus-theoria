le="normal" fill="#1a1d27" text-anchor="start">φ is not a root ⇒ φ is NOT an eigenvalue,</text><text x="558.0" y="310" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="12.8" font-weight="normal" font-style="normal" fill="#1a1d27" text-anchor="start">so  “λ_max(2I − M_H4) = φ”  is FALSE.</text><text x="558.0" y="336" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="12.5" font-weight="bold" font-style="normal" fill="#1a1d27" text-anchor="start">phi_not_mem_spectrum :  φ ∉ spectrum ℝ B</text><text x="558.0" y="358" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="12" font-weight="normal" font-style="normal" fill="#3a4051" text-anchor="start">True Perron value 2·cos(π/30) ≈ 1.989 (h=30)</text><text x="558.0" y="376" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="12" font-weight="normal" font-style="normal" fill="#3a4051" text-anchor="start">stays documentary (full spectrum not formalized).</text><rect x="40" y="406" width="980" height="182" rx="12" ry="12" fill="#f5f6fa" stroke="#d4d8e2" stroke-width="1.5"/><rect x="40" y="406" width="6" height="182" rx="3" ry="3" fill="#1f9d57"/><rect x="941" y="418" width="65" height="22" rx="11.0" ry="11.0" fill="#1f9d57"/><text x="973.5" y="433.5" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="12.5" font-weight="bold" font-style="normal" fill="#ffffff" text-anchor="middle">PROVEN</text><text x="60" y="434" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="14.5" font-weight="bold" font-style="normal" fill="#1f9d57" text-anchor="start">Machine-checked (classical trio, no sorry)</text><text x="64" y="458" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="13.5" font-weight="normal" font-style="normal" fill="#1a1d27" text-anchor="start">phi_sq_eq :  φ² = φ + 1        ∴  C = 1 + φ = φ² ≈ 2.618</text><text x="64" y="479" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="13.5" font-weight="normal" font-style="normal" fill="#1a1d27" text-anchor="start">coxeterCharpoly φ = −(φ²)        (H4 charpoly evaluated at φ)</text><text x="64" y="500" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="13.5" font-weight="normal" font-style="normal" fill="#1a1d27" text-anchor="start">phi_not_root :  coxeterCharpoly φ ≠ 0</text><text x="64" y="521" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="13.5" font-weight="normal" font-style="normal" fill="#1a1d27" text-anchor="start">det_charmatrix :  det(λ·I − B) = coxeterCharpoly λ   (Laplace cofactor expansion)</text><text x="64" y="542" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="13.5" font-weight="normal" font-style="normal" fill="#1a1d27" text-anchor="start">phi_not_mem_spectrum :  φ ∉ spectrum ℝ B   (φ is NOT an eigenvalue)</text><text x="64" y="564" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="13" font-weight="italic" font-style="normal" fill="#3a4051" text-anchor="start">↳ B is a concrete Matrix (Fin 4) (Fin 4) ℝ; the det↔charpoly bridge and “φ not an eigenvalue” are now in Lean.</text><rect x="40" y="606" width="480.0" height="150" rx="12" ry="12" fill="#fdeaea" stroke="#eab8b8" stroke-width="1.5"/><rect x="372.0" y="618" width="134" height="22" rx="11.0" ry="11.0" fill="#d23f3f"/><text x="439.0" y="633.5" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="12.5" font-weight="bold" font-style="normal" fill="#ffffff" text-anchor="middle">NOT FORMALIZED</text><text x="60" y="636" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="14.5" font-weight="bold" font-style="normal" fill="#d23f3f" text-anchor="start">Not constructed in Lean</text><text x="60" y="664" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="13" font-weight="normal" font-style="normal" fill="#3a4051" text-anchor="start">• the 600-cell / 120-cell POLYTOPE</text><text x="60" y="685" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="13" font-weight="normal" font-style="normal" fill="#3a4051" text-anchor="start">• (its 120 / 600 vertices and edges)</text><text x="60" y="706" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="13" font-weight="normal" font-style="normal" fill="#3a4051" text-anchor="start">• the H4 adjacency-graph spectrum</text><text x="60" y="727" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="13" font-weight="normal" font-style="normal" fill="#3a4051" text-anchor="start">• the SU(2) polymer-rate win — Status: Open</text><rect x="540.0" y="606" width="480.0" height="150" rx="12" ry="12" fill="#f5f6fa" stroke="#d4d8e2" stroke-width="1.5"/><rect x="958.0" y="618" width="48" height="22" rx="11.0" ry="11.0" fill="#7a59c2"/><text x="982.0" y="633.5" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="12.5" font-weight="bold" font-style="normal" fill="#ffffff" text-anchor="middle">OPEN</text><text x="558.0" y="636" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="14.5" font-weight="bold" font-style="normal" fill="#5b3fa0" text-anchor="start">Named-open hypotheses</text><text x="558.0" y="662" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="12.5" font-weight="normal" font-style="normal" fill="#3a4051" text-anchor="start">h_spec :  EffDeg(x) ≤ φ</text><text x="558.0" y="681" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="12.5" font-weight="normal" font-style="normal" fill="#3a4051" text-anchor="start">h_kp :  weighted Kotecký–Preiss combinator</text><text x="558.0" y="700" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="12.5" font-weight="normal" font-style="normal" fill="#3a4051" text-anchor="start">h_defect :  Defect ≤ log(1 + φ·R)</text><text x="558.0" y="719" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="12.5" font-weight="normal" font-style="normal" fill="#3a4051" text-anchor="start">h_rate :  log 7 + 22/25 ≤ I_E</text><text x="558.0" y="738" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="12.5" font-weight="normal" font-style="normal" fill="#3a4051" text-anchor="start">h_graph :  Defect ≤ log(1+φ) − ε</text><rect x="40" y="774" width="980" height="40" rx="8" ry="8" fill="#1a1d27"/><text x="58" y="799" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="13.5" font-weight="normal" font-style="normal" fill="#e7ebf5" text-anchor="start">Wall262a R-model (invented weights):  R(a) = 1 − (a/2 + a²/3 + a³/16 + a⁴/60)   ·   R(e^(−0.88)) ≤ 1743/2000 = 0.8715</text><text x="40" y="842" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="11.5" font-weight="normal" font-style="normal" fill="#6b7280" text-anchor="start">Faithful to  Wall261_H4Defect · Wall262_ConnectiveRatio · Wall262a_RatioModel · Wall263_CoxeterSpectral</text><text x="40" y="860" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="11.5" font-weight="normal" font-style="normal" fill="#6b7280" text-anchor="start">AXIOMS = {propext, Classical.choice, Quot.sound}     ·     YM_STATUS = OPEN</text></svg>